<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .hidden { display: none; }
        .btn { padding: 10px 20px; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #005088; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-edit { background: #ffc107; color: #000; margin-right: 5px; }
        .question-card { border: 1px solid #e1e8ed; padding: 20px; margin-bottom: 20px; border-radius: 8px; position: relative; }
        .image-preview { max-width: 100%; max-height: 250px; object-fit: contain; display: block; margin: 15px 0; border-radius: 6px; border: 1px solid #ddd; }
        .search-container { margin: 20px 0; display: flex; gap: 10px; }
        .search-container input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        .admin-controls { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .meta-info { color: #666; font-size: 0.9em; margin-bottom: 10px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; }
        form div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"], textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
    
        <div id="auth-section">
            <h2 id="auth-title">Login</h2>
            <form id="auth-form">
                <div id="name-field" class="hidden">
                    <label>Name</label><input type="text" id="auth-name">
                </div>
                <div><label>Email</label><input type="email" id="auth-email" required></div>
                <div><label>Password</label><input type="password" id="auth-password" required></div>
                <button type="submit" class="btn btn-primary">Continue</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                <a href="#" id="auth-toggle"> Register here.</a>
            </p>
        </div>


        <div id="dashboard-section" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h1>Quiz Dashboard</h1>
                <button id="logout-btn" class="btn btn-danger">Logout</button>
            </div>

            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search questions by keyword...">
                <button id="search-btn" class="btn btn-primary">Search</button>
            </div>
            
            <button id="show-create-btn" class="btn btn-primary"><i class="fa fa-plus"></i> Create Question</button>
            
          
            <div id="form-section" class="hidden" style="margin-top:25px; background: #f8f9fa; padding: 20px; border-radius: 8px;">
                <h3 id="form-title">New Question</h3>
                <form id="question-form">
                    <input type="hidden" id="edit-id">
                    <div><label>Question Text</label><textarea id="q-text" required rows="3"></textarea></div>
                    <div><label>Answer</label><input type="text" id="q-answer" required></div>
                    <div><label>Question Image (Optional)</label><input type="file" id="q-image" accept="image/*"></div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" id="cancel-form-btn" class="btn btn-danger">Cancel</button>
                </form>
            </div>

    
            <div id="questions-list" style="margin-top: 30px;"></div>
            
        
            <div class="pagination">
                <button id="prev-btn" class="btn btn-primary">Previous</button>
                <span id="page-info">Page 1</span>
                <button id="next-btn" class="btn btn-primary">Next</button>
            </div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
